<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stranger Chat App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 80vh;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #0078ff;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .messages-area {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f9f9f9;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message.stranger {
            background: #e4e6eb;
            color: #050505;
            align-self: flex-start;
            border-top-left-radius: 2px;
        }

        .message.you {
            background: #0078ff;
            color: white;
            align-self: flex-end;
            border-top-right-radius: 2px;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
            font-size: 1rem;
            padding-x: 15px;
        }

        .input-area button {
            background: #0078ff;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 8px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: background 0.2s;
        }

        .input-area button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        🌐 StrangerChat Pro
    </div>

    <div id="onlineUsers" style="text-align:center;padding:8px;background:#f1f1f1;font-weight:bold;">
        👥 Online Users: 0
    </div>

    <div class="messages-area" id="messagesArea"></div>

    <div class="input-area">
        <input
            type="text"
            id="messageInput"
            placeholder="Type your message..."
            autocomplete="off">

        <button id="sendBtn">
            Send
        </button>
    </div>

    <div style="display:flex;justify-content:center;padding:10px;">
        <button id="nextBtn"
            style="background:#ff9800;color:white;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;">
            ⏭ Next Stranger
        </button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
